<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Stream Deck ◆ Omarchy</title>
  <style>
    :root {
      --sakura-pink: #FFB7C5;
      --cyber-cyan: #00D9FF;
      --torii-red: #FF4655;
      --neon-purple: #A844FF;
      --dark-purple: #1a0033;
      --dark-blue: #0a1428;
      --text-primary: #f0f4f8;
      --text-secondary: #a8b8d8;
      --glow-soft: 0 0 20px rgba(255, 183, 197, 0.3);
      --glow-intense: 0 0 30px rgba(0, 217, 255, 0.4);
      --shadow-deep: 0 20px 60px rgba(0, 0, 0, 0.5);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0a1428 0%, #1a0a3d 25%, #2d0a4d 50%, #1a1a3d 75%, #0a1428 100%);
      position: relative;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(168, 68, 255, 0.1) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 70, 85, 0.08) 0%, transparent 35%),
        radial-gradient(ellipse at 50% -10%, rgba(0, 217, 255, 0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -5%;
      left: 50%;
      transform: translateX(-50%);
      width: 200%;
      height: 40%;
      background: linear-gradient(to top, rgba(26, 10, 61, 0.4), transparent);
      clip-path: polygon(5% 0%, 25% 20%, 50% 5%, 75% 15%, 95% 0%, 100% 100%, 0% 100%);
      pointer-events: none;
      z-index: 1;
    }

    #deck-container {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    .panel {
      width: 100%;
      max-width: 1200px;
      background: rgba(15, 20, 50, 0.7);
      border: 1px solid rgba(168, 68, 255, 0.3);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      padding: 28px;
      box-shadow: var(--shadow-deep), inset 0 1px 0 rgba(255, 183, 197, 0.1);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(120deg, var(--sakura-pink), var(--cyber-cyan), var(--sakura-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #nav-menu {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .nav-button {
      padding: 14px 16px;
      border: 2px solid transparent;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(168, 68, 255, 0.2), rgba(0, 217, 255, 0.15));
      color: var(--text-primary);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      user-select: none;
      touch-action: manipulation;
    }

    .nav-button:active {
      transform: scale(0.96);
    }

    .nav-button.active {
      border-color: var(--cyber-cyan);
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.3), rgba(168, 68, 255, 0.25));
      box-shadow: var(--glow-intense);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .help {
      margin: 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.5;
      max-width: 500px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--cyber-cyan);
      background: rgba(0, 217, 255, 0.08);
      color: var(--cyber-cyan);
      font-size: 0.9rem;
      font-weight: 600;
    }

    #status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4a7c59;
      box-shadow: 0 0 12px rgba(74, 124, 89, 0.5);
    }

    #views-container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      gap: 16px;
    }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      animation: fadeIn 300ms ease-out;
    }

    .remote-panel {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      grid-column: span 3;
    }

    .remote-panel .remote-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
    }

    .remote-pad {
      display: grid;
      grid-template-columns: repeat(3, minmax(70px, 1fr));
      gap: 10px;
      justify-items: stretch;
      align-items: stretch;
    }

    .remote-pad .remote-button {
      min-height: 60px;
      padding: 0;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .remote-pad .remote-ok {
      min-height: 110px;
      grid-column: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remote-pad .spacer {
      visibility: hidden;
    }

    .remote-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1024px) {
      .deck-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      #nav-menu {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .deck-grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 1.5rem;
      }
    }

    .deck-button {
      position: relative;
      min-height: 140px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: left;
      border: 2px solid transparent;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(168, 68, 255, 0.15), rgba(0, 217, 255, 0.1));
      color: var(--text-primary);
      cursor: pointer;
      transition: all 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
      touch-action: manipulation;
      overflow: hidden;
    }

    .deck-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0, 217, 255, 0.2), transparent 70%);
      opacity: 0;
      transition: opacity 200ms ease;
    }

    .deck-button:hover {
      border-color: rgba(168, 68, 255, 0.5);
    }

    .deck-button:active {
      transform: scale(0.97);
      border-color: var(--cyber-cyan);
    }

    .deck-button.active::before {
      opacity: 1;
    }

    .deck-button .label {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
    }

    .deck-button .meta {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 10px;
      line-height: 1.4;
      position: relative;
      z-index: 2;
    }

    .deck-button.success {
      border-color: var(--sakura-pink);
      background: linear-gradient(135deg, rgba(255, 183, 197, 0.25), rgba(168, 68, 255, 0.15));
      box-shadow: var(--glow-soft);
    }

    .deck-button.error {
      border-color: var(--torii-red);
      background: linear-gradient(135deg, rgba(255, 70, 85, 0.25), rgba(168, 68, 255, 0.15));
      box-shadow: 0 0 20px rgba(255, 70, 85, 0.4);
    }

    .deck-button.special {
      border: 2px solid var(--neon-purple);
      background: linear-gradient(135deg, rgba(168, 68, 255, 0.3), rgba(0, 217, 255, 0.2));
      box-shadow: 0 0 30px rgba(168, 68, 255, 0.3), inset 0 0 20px rgba(168, 68, 255, 0.1);
      min-height: 160px;
    }

    .deck-button.special:active {
      box-shadow: 0 0 40px rgba(168, 68, 255, 0.5), inset 0 0 20px rgba(168, 68, 255, 0.2);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <input type="text" id="hidden-keyboard-input" style="position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; border: none; padding: 0; margin: 0;">
  <div id="deck-debug" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.85); color: #00ff00; padding: 8px; z-index: 10000; font-family: monospace; font-size: 12px; border-radius: 5px; pointer-events: none;">
    iPad DeltaY: <span id="debug-val-y">0</span>
  </div>
  <main id="deck-container">
    <section class="panel">
      <div id="nav-menu">
        <button class="nav-button active" data-view="view-system">🖥️ SISTEMA</button>
        <button class="nav-button" data-view="view-apps">🚀 APLICACIONES</button>
        <button class="nav-button" data-view="view-gaming">🎮 GAMING</button>
        <button class="nav-button" data-view="view-streaming">📺 STREAMING</button>
        <button class="nav-button" data-view="view-entertainment">🎬 ENTRETENIMIENTO</button>
      </div>

      <div class="status-row">
        <div>
          <h1>◆ STREAM DECK</h1>
          <p class="help">Control remoto omnipresente. Conecta desde tu iPad para gestionar OBS, lanzar aplicaciones y juegos desde cualquier lugar.</p>
        </div>
        <div class="status-chip">
          <span id="status-indicator"></span>
          <span id="status-text">Inicializando...</span>
        </div>
      </div>
    </section>

    <section class="panel" id="views-container">
      <div class="deck-grid hidden" id="view-system">
        <button class="deck-button special" data-endpoint="system" data-commandtype="kill-active" data-payload="">
          <span class="label">Kill Ventana</span>
          <span class="meta">Forzar cierre de ventana activa</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="system-suspend" data-payload="">
          <span class="label">Suspender</span>
          <span class="meta">Pone el equipo en suspensión</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="system-poweroff" data-payload="">
          <span class="label">Apagar Equipo</span>
          <span class="meta">Apaga el equipo de forma segura</span>
        </button>
      </div>

      <div class="deck-grid hidden" id="view-apps">
        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="terminal">
          <span class="label">Terminal</span>
          <span class="meta">Abre el emulador de terminal</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="whatsapp">
          <span class="label">WhatsApp</span>
          <span class="meta">WhatsApp Web en Brave</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="telegram">
          <span class="label">Telegram</span>
          <span class="meta">Telegram Web en Brave</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="twitter">
          <span class="label">Twitter/X</span>
          <span class="meta">X en Brave App</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="twitch">
          <span class="label">Twitch</span>
          <span class="meta">Twitch en Brave App</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="facebook">
          <span class="label">Facebook</span>
          <span class="meta">Facebook en Brave App</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="youtube">
          <span class="label">YouTube</span>
          <span class="meta">YouTube en Brave App</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="launchApp" data-payload="brave">
          <span class="label">Brave Browser</span>
          <span class="meta">Abre Brave en modo normal</span>
        </button>
      </div>

      <div class="deck-grid hidden" id="view-gaming">
        <button class="deck-button" data-endpoint="system" data-commandtype="launchGame" data-payload="guildwars2">
          <span class="label">Guild Wars 2</span>
          <span class="meta">Lanza Guild Wars 2 desde Lutris</span>
        </button>
      </div>

      <div class="deck-grid" id="view-streaming">
        <button class="deck-button special" data-endpoint="system" data-commandtype="toggle-obs" data-payload="">
          <span class="label">⚡ OBS</span>
          <span class="meta">Abre/Cierra OBS Studio</span>
        </button>

        <button class="deck-button" data-endpoint="obs" data-action="setCurrentProgramScene" data-payload="Principal">
          <span class="label">Escena Principal</span>
          <span class="meta">Cambia a la escena principal</span>
        </button>

        <button class="deck-button" data-endpoint="obs" data-action="setCurrentProgramScene" data-payload="Gaming">
          <span class="label">Escena Gaming</span>
          <span class="meta">Activa la escena de juego</span>
        </button>

        <button class="deck-button" data-endpoint="obs" data-action="setCurrentProgramScene" data-payload="Chatting">
          <span class="label">Escena Just Chatting</span>
          <span class="meta">Muestra la escena de charla</span>
        </button>

        <button class="deck-button" data-endpoint="obs" data-action="toggleMute" data-payload="Mic/Aux">
          <span class="label">Mutar Micrófono</span>
          <span class="meta">Alterna el micrófono</span>
        </button>

        <button class="deck-button" data-endpoint="obs" data-action="toggleMute" data-payload="Desktop Audio">
          <span class="label">Mutar Audio Juego</span>
          <span class="meta">Alterna audio del escritorio</span>
        </button>

        <button class="deck-button" data-endpoint="obs" data-action="setCurrentProgramScene" data-payload="Camara">
          <span class="label">Cámara Full</span>
          <span class="meta">Pantalla completa de cámara</span>
        </button>
      </div>

      <div class="deck-grid hidden" id="view-entertainment">
        <button class="deck-button" data-endpoint="system" data-commandtype="theater-youtube" data-payload="">
          <span class="label">YouTube (Proyector)</span>
          <span class="meta">Proyector de YouTube en Brave</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="theater-netflix" data-payload="">
          <span class="label">Netflix</span>
          <span class="meta">Abre Netflix en modo app</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="theater-paramount" data-payload="">
          <span class="label">Paramount+</span>
          <span class="meta">Abre Paramount+ en modo app</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="theater-max" data-payload="">
          <span class="label">Max (HBO)</span>
          <span class="meta">Abre Max en modo app</span>
        </button>

        <button class="deck-button" data-endpoint="system" data-commandtype="theater-prime" data-payload="">
          <span class="label">Prime Video</span>
          <span class="meta">Abre Prime Video en modo app</span>
        </button>
        <div class="remote-panel">
          <div class="remote-title">Trackpad Virtual</div>
          <div id="virtual-trackpad" class="deck-button remote-trackpad" style="min-height:600px; display:flex; align-items:center; justify-content:center; width:100%;">
            <span class="label">Usa la pantalla táctil como trackpad (1 dedo = clic izq, 2 dedos = clic der)</span>
          </div>
          <div class="remote-actions">
            <button class="deck-button remote-button" id="btn-keyboard">
              <span class="label">Abrir Teclado</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const navButtons = Array.from(document.querySelectorAll('.nav-button'));
    const views = Array.from(document.querySelectorAll('.deck-grid'));
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const buttons = Array.from(document.querySelectorAll('.deck-button'));

    function setActiveView(viewId) {
      views.forEach((view) => {
        view.classList.toggle('hidden', view.id !== viewId);
      });
      navButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.view === viewId);
      });
    }

    function updateStatus(connected) {
      if (connected) {
        statusIndicator.style.background = '#4aac70';
        statusIndicator.style.boxShadow = '0 0 15px rgba(74, 172, 112, 0.6)';
        statusText.textContent = 'Servidor listo • Conectado';
      } else {
        statusIndicator.style.background = '#ff6b7a';
        statusIndicator.style.boxShadow = '0 0 15px rgba(255, 107, 122, 0.6)';
        statusText.textContent = 'Error de conexión';
      }
    }

    async function sendAction(button) {
      const endpointKey = button.dataset.endpoint;
      const action = button.dataset.action;
      const commandType = button.dataset.commandtype;
      const payloadValue = button.dataset.payload || '';
      let url;
      let body;

      if (endpointKey === 'obs') {
        url = '/api/obs/action';
        body = {
          action,
          payload: action === 'toggleMute' ? { inputName: payloadValue } : { sceneName: payloadValue }
        };
      } else {
        url = '/api/system/action';
        body = {
          commandType,
          payload: payloadValue
        };
      }

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || response.statusText || 'Error de red');
      }

      return await response.json();
    }

    function flashButton(button, type) {
      button.classList.remove('success', 'error');
      void button.offsetWidth;
      button.classList.add(type);
      window.setTimeout(() => button.classList.remove(type), 500);
    }

    navButtons.forEach((button) => {
      button.addEventListener('click', () => {
        setActiveView(button.dataset.view);
      });
    });

    buttons.forEach((button) => {
      button.addEventListener('click', async () => {
        button.classList.add('active');

        try {
          await sendAction(button);
          flashButton(button, 'success');
          updateStatus(true);
        } catch (error) {
          flashButton(button, 'error');
          updateStatus(false);
          statusText.textContent = `Error: ${error.message}`;
        } finally {
          button.classList.remove('active');
        }
      });
    });

    // Helper to send system actions not tied to a button element
    async function sendRemoteAction(commandType, payload = {}) {
      const response = await fetch('/api/system/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ commandType, payload })
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || response.statusText || 'Network error');
      }

      return response.json();
    }

    // Virtual trackpad handling con soporte multitáctil (1 dedo = clic izq, 2 dedos = clic der)
    (function setupTrackpad() {
      const trackpad = document.getElementById('virtual-trackpad');
      if (!trackpad) return;

      let last = null;
      let startPos = null;
      let startTime = 0;
      let isMoving = false;
      const TAP_MAX_MOVEMENT = 10; // pixels
      const TAP_MAX_TIME = 250; // ms

      trackpad.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        last = { x: t.clientX, y: t.clientY };
        startPos = { x: t.clientX, y: t.clientY };
        startTime = Date.now();
        isMoving = false;
      }, { passive: true });

      trackpad.addEventListener('touchmove', (e) => {
        e.preventDefault();
        isMoving = true;
        const currentTouch = e.touches[0];
        if (!last) {
          last = { x: currentTouch.clientX, y: currentTouch.clientY };
          return;
        }

        // Calculamos la diferencia
        const rawDeltaX = currentTouch.clientX - last.x;
        const rawDeltaY = currentTouch.clientY - last.y;

        // Normalizamos basándonos en la densidad de pantalla del iPad para mayor precisión
        const scaleFactor = window.devicePixelRatio || 1;
        const deltaX = rawDeltaX / scaleFactor;
        const deltaY = rawDeltaY / scaleFactor;

        // Actualizamos el debug visual en pantalla
        document.getElementById('debug-val-y').innerText = Math.round(deltaY);
        
        last = { x: currentTouch.clientX, y: currentTouch.clientY };

        // Enviamos los deltas con precisión decimal al backend
        sendRemoteAction('mouse-move', {
          deltaX: deltaX,
          deltaY: deltaY
        }).catch(() => {});
      }, { passive: false });

      trackpad.addEventListener('touchend', (e) => {
        const dt = Date.now() - startTime;
        const endPos = last || startPos;
        const moved = Math.hypot((endPos.x - startPos.x), (endPos.y - startPos.y));

        // Si el toque duró menos de 250ms y el dedo casi no se movió, es un CLICK
        if (!isMoving && dt < TAP_MAX_TIME && moved < TAP_MAX_MOVEMENT) {
          e.preventDefault();
          
          // Detectar cuántos dedos tocaron la pantalla
          const numFingers = e.changedTouches.length;
          
          if (numFingers === 1) {
            // Un dedo = Clic Izquierdo
            sendRemoteAction('mouse-click-left', {}).catch(() => {});
          } else if (numFingers === 2 || (e.touches.length === 1 && numFingers > 1)) {
            // Dos dedos = Clic Derecho
            sendRemoteAction('mouse-click-right', {}).catch(() => {});
          }
        }

        last = null;
        startPos = null;
      });
    })();

    // Teclado remoto compatible con iPad
    const kbdBtn = document.getElementById('btn-keyboard');
    const kbdInput = document.getElementById('hidden-keyboard-input');

    if (kbdBtn && kbdInput) {
      kbdBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        kbdInput.focus(); // Safari lo ejecutará limpiamente
      });

      kbdInput.addEventListener('input', (e) => {
        const text = e.target.value;
        if (text.length > 0) {
          sendRemoteAction('type-character', { char: text }).catch(() => {});
          kbdInput.value = ''; // Limpieza inmediata para el siguiente carácter
        }
      });

      kbdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          sendRemoteAction('press-key', { key: 'enter' }).catch(() => {});
        } else if (e.key === 'Backspace') {
          sendRemoteAction('press-key', { key: 'backspace' }).catch(() => {});
        }
      });
    }

    window.addEventListener('load', () => {
      setActiveView('view-system');
      updateStatus(true);
    });
  </script>
</body>
</html>
